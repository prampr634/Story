<!DOCTYPE html>
<html>
<head>
  <title>Detective Mira: Case Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>🕵️ Detective Mira</h1>
    <div class="stats">
      ⭐ <span id="score">0</span>
      🧠 <span id="clues">0</span>
      ⚖️ <span id="trust">0</span>
    </div>
  </header>

  <main id="scene" class="scene">
    <p id="text"></p>
    <div id="choices"></div>
  </main>

  <div class="inventory">
    🎒 Inventory: <span id="inv">None</span>
  </div>

  <button onclick="start()">Restart Case 🔄</button>

</div>

<script src="script.js"></script>
</body>
</html>
