<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detective Mira</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="top-bar">
      <h1>🕵️ Detective Mira</h1>
      <div class="stats">
        ⭐ <span id="score">0</span>
        🧠 <span id="clues">0</span>
        ⚖️ <span id="trust">0</span>
      </div>
    </div>

    <div class="game-card fade" id="card">
      <p id="text"></p>
      <div id="choices"></div>
    </div>

    <button class="restart" onclick="start()">Restart Case 🔄</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
