<!DOCTYPE html>
<html>
<head>
  <title>Detective Mira: AAA Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="top">
    <h1>🕵️ Detective Mira</h1>
    <div class="hud">
      ⭐ <span id="score">0</span>
      🧠 <span id="clues">0</span>
      ⚖️ <span id="trust">0</span>
    </div>
  </header>

  <div id="scene" class="scene">
    <p id="text"></p>
    <div id="choices"></div>
  </div>

  <div class="bottom">
    🎒 Inventory: <span id="inv"></span>
  </div>

  <div class="buttons">
    <button onclick="saveGame()">💾 Save</button>
    <button onclick="loadGame()">📂 Load</button>
    <button onclick="startGame()">🔄 Restart</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
