<!DOCTYPE html>
<html>
<head>
  <title>Detective Mira: Case File Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>🕵️ Detective Mira</h1>

  <div class="hud">
    ⭐ Score: <span id="score">0</span>
    🧠 Clues: <span id="clues">0</span>
    ⚖️ Trust: <span id="trust">0</span>
    🎒 Inventory: <span id="inv">None</span>
  </div>

  <div class="scene-box">
    <p id="text"></p>
    <div id="choices"></div>
  </div>

  <button onclick="startGame()">Restart Case 🔄</button>

</div>

<script src="script.js"></script>
</body>
</html>
