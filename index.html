<!DOCTYPE html>
<html>
<head>
  <title>Detective Mira: Cinematic Case Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="top">
    <h1>🕵️ Detective Mira</h1>

    <div class="hud">
      ⭐ <span id="score">0</span>
      🧠 <span id="clues">0</span>
      ⚖️ <span id="trust">0</span>
    </div>
  </header>

  <div id="scene" class="scene cinematic">
    <p id="text"></p>
    <div id="choices"></div>
  </div>

  <div class="inventory">
    🎒 Inventory: <span id="inv">None</span>
  </div>

  <div class="audio-ui">
    🔊 Volume
    <input type="range" id="volume" min="0" max="1" step="0.05" value="0.6">
  </div>

  <div class="controls">
    <button onclick="saveGame()">💾 Save</button>
    <button onclick="loadGame()">📂 Load</button>
    <button onclick="startGame()">🔄 Restart</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
