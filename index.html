<!DOCTYPE html>
<html>
<head>
  <title>Sherlock Holmes: Final Case Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

  <header>
    <h1>🕵️ Sherlock Holmes: Case Engine</h1>

    <div class="hud">
      🧠 Clues: <span id="clueCount">0</span>
      ⚖️ Trust: <span id="trust">0</span>
      🌫️ Tension: <span id="tension">0</span>
    </div>
  </header>

  <main id="scene" class="scene">
    <p id="text"></p>
    <div id="choices"></div>
  </main>

  <section class="layout">

    <div class="panel">
      <h3>🗺️ London Map</h3>
      <button onclick="go('kitchen')">🍽️ Kitchen Wing</button>
      <button onclick="go('security')">🖥️ Security Office</button>
      <button onclick="go('garden')">🌿 Garden</button>
      <button onclick="go('vault')">🏛️ Vault</button>
    </div>

    <div class="panel">
      <h3>🧠 Evidence Board</h3>
      <ul id="board"></ul>
    </div>

  </section>

  <footer>
    🔊 Volume
    <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6">
    <button onclick="startGame()">Restart Case</button>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
