<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Open World Detective Engine</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="hud">
  🕵️ Clues: <span id="clueCount">0</span>
</div>

<div id="world">

  <div id="map">
    <button onclick="travel('museum')">🏛️ Museum</button>
    <button onclick="travel('alley')">🌑 Alley</button>
    <button onclick="travel('station')">🚉 Station</button>
    <button onclick="travel('house')">🏠 Suspect House</button>
  </div>

  <div id="location">
    <h2 id="locName"></h2>
    <div id="npc"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>

  <div id="board"></div>

</div>

<script src="script.js"></script>

</body>
</html>
